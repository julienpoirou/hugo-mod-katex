name: Feature request
description: Propose a new idea or improvement
labels: ["type:feature"]
assignees: []
body:
  - type: markdown
    attributes:
      value: Please describe the problem and the proposed solution.

  - type: input
    id: motivation
    attributes:
      label: Motivation
      placeholder: e.g. "Need another shortcode option for KaTeX"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      placeholder: What should happen? Any shortcode params, mounts, or behavior changes?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: Affects shortcode API
        - label: Affects runtime JS/CSS
        - label: Docs update required
