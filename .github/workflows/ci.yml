name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.159.0"
          extended: true

      - name: Build sample site
        shell: bash
        run: |
          set -euo pipefail
          SITE_DIR="${RUNNER_TEMP}/site"
          OUT_DIR="${RUNNER_TEMP}/public"
          mkdir -p "${SITE_DIR}/content" "${SITE_DIR}/assets" "${SITE_DIR}/layouts/_default" "${SITE_DIR}/_modules"
          ln -s "${GITHUB_WORKSPACE}" "${SITE_DIR}/_modules/hugo-mod-katex"

          cat > "${SITE_DIR}/layouts/_default/single.html" <<'EOF'
          <!DOCTYPE html>
          <html><body>{{ .Content }}</body></html>
          EOF

          cat > "${SITE_DIR}/layouts/_default/list.html" <<'EOF'
          <!DOCTYPE html>
          <html><body>{{ .Content }}</body></html>
          EOF

          cat > "${SITE_DIR}/hugo.toml" <<'EOF'
          baseURL = "https://example.org/"
          [module]
            [[module.mounts]]
              source = "content"
              target = "content"
            [[module.mounts]]
              source = "layouts"
              target = "layouts"
            [[module.mounts]]
              source = "_modules/hugo-mod-katex/layouts"
              target = "layouts"
            [[module.mounts]]
              source = "_modules/hugo-mod-katex/static"
              target = "static"
          EOF

          cat > "${SITE_DIR}/content/test.md" <<'EOF'
          ---
          title: "KaTeX test"
          ---

          Inline: {{< katex-inline expr="e^{i\pi} + 1 = 0" />}}

          {{< katex expr="\sum_{i=1}^{n} \frac{1}{i^2}" />}}
          EOF

          hugo --source "${SITE_DIR}" --destination "${OUT_DIR}"
          grep -q 'vendor/hugo-mod-katex/hugo-mod-katex.js' "${OUT_DIR}/test/index.html"
          grep -q 'data-hugo-mod-katex' "${OUT_DIR}/test/index.html"
